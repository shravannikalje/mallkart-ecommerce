<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="clock-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="clock-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-clock"></i> World Digital Clock</h1>
            <p>Current time across different time zones</p>
        </div>

        <!-- Main Clock Display -->
        <div class="main-clock-section">
            <div class="local-time-display">
                <h2>Local Time</h2>
                <div class="time-display">
                    <span id="mainTime" class="main-time">00:00:00</span>
                    <span id="mainPeriod" class="period">AM</span>
                </div>
                <div class="date-display">
                    <span id="mainDate" class="main-date">--/--/----</span>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="format-toggle">
                <label for="format-select">Format:</label>
                <select id="format-select">
                    <option value="12">12 Hour</option>
                    <option value="24">24 Hour</option>
                </select>
            </div>
            <div class="timezone-search">
                <input type="text" id="timezone-search" placeholder="Search timezone...">
                <button id="add-timezone-btn"><i class="fas fa-plus"></i> Add Timezone</button>
            </div>
        </div>

        <!-- Time Zones Grid -->
        <div class="timezones-section">
            <h2>Time Zones</h2>
            <div class="timezones-grid" id="timezonesGrid">
                <!-- Timezone cards will be inserted here -->
            </div>
        </div>

        <!-- Preset Timezones -->
        <div class="preset-timezones">
            <h3>Preset Timezones</h3>
            <div class="preset-list">
                <button class="preset-btn" data-timezone="UTC">UTC</button>
                <button class="preset-btn" data-timezone="Asia/Kolkata">India (IST)</button>
                <button class="preset-btn" data-timezone="America/New_York">New York (EST)</button>
                <button class="preset-btn" data-timezone="Europe/London">London (GMT)</button>
                <button class="preset-btn" data-timezone="Asia/Tokyo">Tokyo (JST)</button>
                <button class="preset-btn" data-timezone="Australia/Sydney">Sydney (AEDT)</button>
                <button class="preset-btn" data-timezone="Europe/Paris">Paris (CET)</button>
                <button class="preset-btn" data-timezone="Asia/Dubai">Dubai (GST)</button>
                <button class="preset-btn" data-timezone="America/Los_Angeles">Los Angeles (PST)</button>
                <button class="preset-btn" data-timezone="Asia/Singapore">Singapore (SGT)</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="clock-footer">
            <p>Time Zone Information • Current Time Across Globe • Digital Clock</p>
        </div>
    </div>

    <!-- Timezone Modal -->
    <div id="timezoneModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Select a Timezone</h2>
            <input type="text" id="modal-search" placeholder="Search timezone...">
            <div id="timezoneList" class="timezone-list">
                <!-- Timezones will be populated here -->
            </div>
        </div>
    </div>

    <script src="clock-script.js"></script>
</body>
</html>
